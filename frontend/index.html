<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#020617" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatify - an advance chat-app</title>

    <style>
      html, body {
        background: #020617;
        height: 100%;
      }

      #loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #020617;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
        transition: opacity 0.5s ease;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .loader-brand {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loader-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1.5px solid transparent;
        border-top-color: #10b981;
        border-right-color: #10b98140;
        animation: spin 1.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      .loader-ring-outer {
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        border: 1px solid transparent;
        border-top-color: #34d39930;
        border-left-color: #34d39918;
        animation: spin 2s cubic-bezier(0.4, 0, 0.2, 1) infinite reverse;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .loader-logo {
        width: 44px;
        height: 44px;
        object-fit: contain;
        border-radius: 10px;
        animation: breathe 3s ease-in-out infinite;
      }

      @keyframes breathe {
        0%, 100% { opacity: 0.9; transform: scale(1); }
        50%       { opacity: 1;   transform: scale(1.04); }
      }

      .loader-status {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .loader-app-name {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.3px;
        color: #f1f5f9;
        margin: 0;
      }

      .loader-app-name span {
        color: #10b981;
      }

      #loader-text {
        font-size: 13px;
        color: #475569;
        letter-spacing: 0.2px;
        transition: opacity 0.25s ease;
        min-height: 18px;
        margin: 0;
      }

      .loader-dots {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .loader-dots span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #10b981;
        animation: dotPulse 1.4s ease-in-out infinite;
      }

      .loader-dots span:nth-child(2) { animation-delay: 0.18s; }
      .loader-dots span:nth-child(3) { animation-delay: 0.36s; }

      @keyframes dotPulse {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40%            { transform: scale(1);   opacity: 1; }
      }

      .loader-track {
        width: 120px;
        height: 2px;
        background: #0f172a;
        border-radius: 2px;
        overflow: hidden;
      }

      .loader-fill {
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #10b981, #34d399);
        border-radius: 2px;
        animation: shimmer-bar 1.6s ease-in-out infinite;
        transform-origin: left;
      }

      /* ✅ Renamed to shimmer-bar to avoid conflict with app's .shimmer class */
      @keyframes shimmer-bar {
        0%   { transform: translateX(-100%) scaleX(1); }
        50%  { transform: translateX(60%)   scaleX(1.5); }
        100% { transform: translateX(200%)  scaleX(1); }
      }
    </style>
  </head>

  <body>
    <div id="loader">
      <div class="loader-brand">
        <div class="loader-ring-outer"></div>
        <div class="loader-ring"></div>
        <img src="/logo.png" alt="Chatify" class="loader-logo" />
      </div>

      <div class="loader-status">
        <p class="loader-app-name">Chat<span>ify</span></p>
        <div class="loader-dots"><span></span><span></span><span></span></div>
        <p id="loader-text">Restoring session...</p>
        <div class="loader-track">
          <div class="loader-fill"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
