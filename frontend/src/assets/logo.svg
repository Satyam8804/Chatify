<svg width="180" height="60" viewBox="0 0 180 60" xmlns="http://www.w3.org/2000/svg" fill="none">
  
  <!-- Chat bubble -->
  <rect x="5" y="10" width="40" height="30" rx="10" fill="#22c55e"></rect>
  
  <!-- Bubble tail -->
  <polygon points="18,40 25,40 20,50" fill="#22c55e"></polygon>

  <!-- Message dots -->
  <circle cx="18" cy="25" r="3" fill="white"></circle>
  <circle cx="25" cy="25" r="3" fill="white"></circle>
  <circle cx="32" cy="25" r="3" fill="white"></circle>

  <!-- App name -->
  <text x="60" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937">
    Chatify
  </text>

</svg>